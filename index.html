<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionnaire de Budget</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Gestionnaire de Budget</h1>
            <div class="month-selector">
                <button id="prevMonth" class="month-btn">←</button>
                <h2 id="currentMonth"></h2>
                <button id="nextMonth" class="month-btn">→</button>
            </div>
        </header>

        <div class="summary-cards">
            <div class="card income-card">
                <h3>Revenu Mensuel</h3>
                <p class="amount" id="totalIncome">0,00 $</p>
            </div>
            <div class="card expense-card">
                <h3>Dépenses Totales</h3>
                <p class="amount" id="totalExpenses">0,00 $</p>
            </div>
            <div class="card balance-card">
                <h3>Reste</h3>
                <p class="amount" id="remaining">0,00 $</p>
            </div>
        </div>

        <div class="main-content">
            <div class="left-panel">
                <div class="section">
                    <h3>💵 Définir le Revenu Mensuel</h3>
                    <div class="input-group">
                        <input type="number" id="incomeAmount" placeholder="Entrer le montant" step="0.01">
                        <button id="setIncome" class="btn-primary">Définir le Revenu</button>
                    </div>
                </div>

                <div class="section">
                    <h3>➕ Ajouter une Dépense</h3>
                    <div class="input-group">
                        <input type="text" id="expenseName" placeholder="Nom de la dépense">
                        <input type="number" id="expenseAmount" placeholder="Montant" step="0.01">
                        <select id="expenseCategory">
                            <option value="Logement">🏠 Logement</option>
                            <option value="Nourriture">🍔 Nourriture</option>
                            <option value="Transport">🚗 Transport</option>
                            <option value="Services">💡 Services</option>
                            <option value="Divertissement">🎮 Divertissement</option>
                            <option value="Santé">🏥 Santé</option>
                            <option value="Magasinage">🛍️ Magasinage</option>
                            <option value="Autre">📦 Autre</option>
                        </select>
                        <button id="addExpense" class="btn-primary">Ajouter la Dépense</button>
                    </div>
                </div>

                <div class="section">
                    <h3>📋 Liste des Dépenses</h3>
                    <div id="expensesList"></div>
                </div>
            </div>

            <div class="right-panel">
                <div class="chart-container">
                    <h3>Dépenses par Catégorie</h3>
                    <canvas id="pieChart"></canvas>
                </div>
                <div class="chart-container">
                    <h3>Répartition par Catégorie</h3>
                    <canvas id="barChart"></canvas>
                </div>
            </div>
        </div>

        <div class="actions">
            <button id="exportData" class="btn-secondary">📥 Exporter les Données</button>
            <button id="importData" class="btn-secondary">📤 Importer les Données</button>
            <button id="clearMonth" class="btn-danger">🗑️ Effacer ce Mois</button>
        </div>
    </div>

    <input type="file" id="fileInput" accept=".json" style="display: none;">

    <script src="script.js"></script>
</body>
</html>
